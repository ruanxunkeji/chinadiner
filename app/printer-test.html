<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Printer Test</title>
  <style>
    body { font-family: monospace; padding: 24px; background: #1e1e1e; color: #d4d4d4; }
    h2 { margin-top: 0; color: #9cdcfe; }
    label { display: block; margin-top: 12px; font-size: 13px; color: #9cdcfe; }
    select, input[type=number], textarea {
      width: 100%; padding: 6px 8px; margin-top: 4px; box-sizing: border-box;
      background: #2d2d2d; color: #d4d4d4; border: 1px solid #555; border-radius: 4px;
      font-family: monospace; font-size: 13px;
    }
    button {
      margin-top: 16px; margin-right: 8px; padding: 8px 18px;
      background: #0e639c; color: #fff; border: none; border-radius: 4px;
      font-size: 13px; cursor: pointer;
    }
    button:hover { background: #1177bb; }
    button#refreshBtn { background: #444; }
    button#refreshBtn:hover { background: #555; }
    #result {
      margin-top: 16px; padding: 10px 14px; border-radius: 4px;
      font-size: 13px; white-space: pre-wrap; min-height: 36px;
      background: #2d2d2d; border: 1px solid #555;
    }
    #result.ok  { border-color: #4ec94e; color: #4ec94e; }
    #result.err { border-color: #f44747; color: #f44747; }
    hr { border-color: #444; margin: 20px 0; }
  </style>
</head>
<body>
  <h2>Printer Test</h2>

  <label>Printer
    <select id="printerSelect"><option value="">— loading —</option></select>
  </label>
  <button id="refreshBtn">Refresh printers</button>

  <label>Printer name (editable)
    <input type="text" id="printerName" placeholder="Leave blank to use selection above" />
  </label>

  <hr />

  <label>HTML content to print
    <textarea id="htmlContent" rows="6">&lt;h1 style="font-family:sans-serif"&gt;Test Receipt&lt;/h1&gt;
&lt;p&gt;Silent print test from Good Diner&lt;/p&gt;
&lt;p&gt;Time: &lt;span id="ts"&gt;&lt;/span&gt;&lt;/p&gt;
&lt;script&gt;document.getElementById('ts').textContent = new Date().toLocaleString()&lt;/script&gt;</textarea>
  </label>

  <label>Copies
    <input type="number" id="copies" value="1" min="1" max="9" style="width:80px" />
  </label>

  <label>Page Width (e.g. 72mm, leave blank for default)
    <input type="text" id="pageWidth" placeholder="e.g. 72mm" style="width:140px" />
  </label>

  <label>Page Height (e.g. 297mm, leave blank for default)
    <input type="text" id="pageHeight" placeholder="e.g. 297mm" style="width:140px" />
  </label>

  <label>Render delay (ms)
    <input type="number" id="renderDelay" value="500" min="0" max="5000" style="width:100px" />
  </label>

  <label><input type="checkbox" id="silentPrint" checked /> Silent print</label>

  <button id="printBtn">Print</button>

  <hr />

  <h2>Print by IP / Port (raw TCP)</h2>

  <label>Printer IP
    <input type="text" id="printerIp" placeholder="e.g. 192.168.1.100" />
  </label>

  <label>Port
    <input type="number" id="printerPort" value="9100" min="1" max="65535" style="width:100px" />
  </label>

  <label>Text to print
    <textarea id="ipPrintText" rows="4">Test Receipt
Silent print test from Good Diner
</textarea>
  </label>

  <button id="printIpBtn">Print to IP</button>

  <div id="result">Ready.</div>

  <script>
    const api = window.electronAPI

    async function loadPrinters() {
      const select = document.getElementById('printerSelect')
      select.innerHTML = '<option value="">— loading —</option>'
      try {
        const printers = await api.getPrinters()
        select.innerHTML = printers.length
          ? printers.map(p => `<option value="${p.name}">${p.name}${p.isDefault ? ' (default)' : ''}</option>`).join('')
          : '<option value="">No printers found</option>'
        document.getElementById('printerName').value = select.value
      } catch (e) {
        select.innerHTML = '<option value="">Error loading printers</option>'
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', loadPrinters)

    document.getElementById('printerSelect').addEventListener('change', (e) => {
      document.getElementById('printerName').value = e.target.value
    })

    document.getElementById('printBtn').addEventListener('click', async () => {
      const result = document.getElementById('result')
      result.className = ''
      result.textContent = 'Printing…'

      const html = document.getElementById('htmlContent').value
      const deviceName = document.getElementById('printerName').value.trim() || document.getElementById('printerSelect').value
      const copies = parseInt(document.getElementById('copies').value, 10) || 1
      const renderDelay = parseInt(document.getElementById('renderDelay').value, 10) || 500
      const pageWidth = document.getElementById('pageWidth').value.trim()
      const pageHeight = document.getElementById('pageHeight').value.trim()
      const pageSize = (pageWidth || pageHeight)
        ? { ...(pageWidth ? { width: pageWidth } : {}), ...(pageHeight ? { height: pageHeight } : {}) }
        : undefined

      const url = 'data:text/html;charset=utf-8,' + encodeURIComponent(html)
      try {
        const silent = document.getElementById('silentPrint').checked
        const res = await api.printUrlSilent(url, { deviceName, copies, renderDelay, ...(pageSize ? { pageSize } : {}), silent })
        result.className = res.success ? 'ok' : 'err'
        result.textContent = JSON.stringify(res, null, 2)
      } catch (e) {
        result.className = 'err'
        result.textContent = String(e)
      }
    })

    document.getElementById('printIpBtn').addEventListener('click', async () => {
      const result = document.getElementById('result')
      result.className = ''
      result.textContent = 'Connecting…'

      const ip = document.getElementById('printerIp').value.trim()
      const port = parseInt(document.getElementById('printerPort').value, 10) || 9100
      const text = document.getElementById('ipPrintText').value

      if (!ip) {
        result.className = 'err'
        result.textContent = 'Please enter a printer IP address.'
        return
      }

      try {
        const res = await api.printToIp({ ip, port, text })
        result.className = res.success ? 'ok' : 'err'
        result.textContent = JSON.stringify(res, null, 2)
      } catch (e) {
        result.className = 'err'
        result.textContent = String(e)
      }
    })

    loadPrinters()
  </script>
</body>
</html>
